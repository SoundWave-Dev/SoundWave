services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: soundwave
      POSTGRES_USER: soundwave
      POSTGRES_PASSWORD: soundwave
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./soundwave-backend
    environment:
      DEBUG: "True"
      DB_NAME: soundwave
      DB_USER: soundwave
      DB_PASSWORD: soundwave
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ./soundwave-backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./soundwave-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./soundwave-frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
